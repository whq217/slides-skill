<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>

<!-- ========== 字体（根据主题替换）========== -->
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- FontAwesome 图标 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Reveal.js CSS — 只加载一次 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/white.min.css">

<style>
/* ===========================================
   主题变量 — 只需改这一段
   =========================================== */
:root {
    --bg-primary: #ffffff;
    --bg-dark: #1c1e54;
    --text-heading: #061b31;
    --text-body: #64748d;
    --accent: #533afd;
    --accent-rgb: 83,58,253;
    --accent2: #ff00aa;
    --accent2-rgb: 255,0,170;
    --accent-light: rgba(83,58,253,0.08);
    --border: #e5edf5;
    --font: 'Work Sans', 'Noto Sans SC', 'PingFang SC', sans-serif;
    --ease: cubic-bezier(0.16,1,0.3,1);
    --cover-title-size: 2.2rem;
    --slide-title-size: 1.1rem;
}

/* ===========================================
   基础样式 — 不要修改（防御 Reveal.js 主题覆盖）
   =========================================== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg-primary) !important; min-height: 100vh; }
body { font-family: var(--font); background: transparent !important; color: var(--text-heading); }

/* Reveal.js 透明层 */
.reveal { color: var(--text-heading); background: transparent !important; position: relative; z-index: 1; }
.reveal .slides { background: transparent !important; }
.reveal .slides > section { background: transparent !important; padding: 0 !important; }
.reveal .slides > section > section { padding: 44px 60px 30px !important; }

/* ⚠️ 覆盖 Reveal.js 主题的标题默认样式 */
.reveal h1, .reveal h2, .reveal h3, .reveal h4 { color: var(--text-heading); font-family: var(--font); }

/* ⚠️ 封面强制白色文字（防御 Reveal.js 主题覆盖） */
[data-state="cover"] h1, [data-state="cover"] h2, [data-state="cover"] h3, [data-state="cover"] p, [data-state="cover"] span { color: #ffffff !important; }
/* ⚠️ 深色背景卡片白色文字防御 */
.suggest-card h3, .big-data-card h3 { color: #ffffff !important; }

/* ⚠️ 内容页强制左对齐（Reveal.js 主题默认 text-align:center） */
.reveal .slides > section > section:not([data-state="cover"]) { text-align: left; }

/* ===========================================
   导航栏
   =========================================== */
.top-nav {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; z-index: 1000; font-size: 13px;
}
.top-nav .nb { font-weight: 500; font-size: 15px; color: var(--text-heading); }
.top-nav .nl { display: flex; gap: 24px; }
.top-nav .nl a {
    color: var(--text-body); text-decoration: none; cursor: pointer;
    transition: color 0.2s; position: relative;
}
.top-nav .nl a:hover, .top-nav .nl a.active { color: var(--accent); }
.top-nav .nl a.active::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 2px; background: var(--accent); border-radius: 1px;
}

/* ===========================================
   封面 — 三种布局
   =========================================== */
.reveal .slides > section[data-state="cover"],
.reveal .slides > section > section[data-state="cover"] {
    position: absolute !important; top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important; padding: 0 !important;
}

/* 封面通用 — 强制左对齐 */
.cover-left, .cover-right { text-align: left; }
.cover-centered { text-align: center; }

/* C-1 居中式（含上下分栏变体） */
.cover-centered-wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; height: 100%; text-align: center;
}

/* C-3 双色调分割（左右分栏变体） */
.cover-split { display: flex; width: 100%; height: 100%; }
.cover-split .cover-left {
    flex: 1.1; background: var(--bg-primary); padding: 60px 50px;
    display: flex; flex-direction: column; justify-content: center; text-align: left;
}
.cover-split .cover-right {
    flex: 0.9; background: var(--bg-dark);
    display: flex; flex-direction: column; justify-content: center;
    padding: 50px; position: relative; text-align: left;
}
.cover-split .cover-right::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: linear-gradient(180deg, var(--accent), var(--accent));
}

/* C-2 卡片式 */
.cover-card-wrap {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
}
.cover-float-card {
    background: var(--bg-primary); border-radius: 8px; padding: 56px 64px;
    box-shadow: rgba(50,50,93,0.25) 0px 50px 100px -20px, rgba(0,0,0,0.3) 0px 30px 60px -30px;
    max-width: 780px; text-align: left;
}

/* 封面元素 */
.cover-tag {
    display: inline-block; background: var(--accent-light); color: var(--accent);
    padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 500;
    margin-bottom: 20px; letter-spacing: 1px; width: fit-content;
}
.cover-title {
    font-size: var(--cover-title-size); font-weight: 500;
    color: var(--text-heading); letter-spacing: -0.8px;
    line-height: 1.25; margin-bottom: 12px;
}
/* ⚠️ !important 覆盖 Reveal.js 主题的 h1 默认字号 */
.reveal h1.cover-title {
    font-size: var(--cover-title-size) !important;
    font-weight: 500 !important;
    line-height: 1.25 !important;
    margin-bottom: 12px !important;
    letter-spacing: -0.8px !important;
}
.cover-divider { width: 40px; height: 2px; background: var(--accent); margin-bottom: 16px; }
.cover-subtitle { font-size: 0.9rem; color: var(--text-body); line-height: 1.6; margin-bottom: 18px; }
.cover-meta { font-size: 12px; color: var(--text-body); line-height: 1.8; }
.cover-meta strong { color: var(--text-heading); font-weight: 500; }

/* 封面右侧数据 */
.cover-data-card { margin-bottom: 24px; }
.cover-data-card .num { font-size: 2.8rem; font-weight: 300; color: #ffffff; letter-spacing: -1px; }
.cover-data-card .unit { font-size: 1rem; color: rgba(255,255,255,0.5); margin-left: 4px; }
.cover-data-card .desc { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.cover-data-row { display: flex; gap: 20px; margin-top: 12px; }
.cover-data-item { min-width: 80px; }
.cover-data-item .val { font-size: 1.8rem; font-weight: 300; color: var(--accent); }
.cover-data-item .lbl { font-size: 12px; color: rgba(255,255,255,0.4); }

/* ===========================================
   Slide 标题
   =========================================== */
.slide-title {
    font-size: var(--slide-title-size); font-weight: 600;
    color: var(--text-heading); margin-bottom: 14px;
    padding-bottom: 6px; border-bottom: 2px solid var(--accent);
    display: inline-block; letter-spacing: -0.2px;
}

/* ===========================================
   卡片 — flex 布局：图标左列 + 文字右列
   =========================================== */
.card {
    background: #ffffff; border-radius: 6px; padding: 14px;
    border: 1px solid var(--border);
    box-shadow: rgba(23,23,23,0.06) 0px 3px 6px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.2), 0 0 25px rgba(var(--accent-rgb), 0.1); }
.card-icon {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--accent-light); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0;
}
.card-title { font-size: 0.82rem; font-weight: 500; color: var(--text-heading); margin-bottom: 4px; }
.card-text { font-size: 0.76rem; color: var(--text-body); line-height: 1.5; }

/* ===========================================
   数据显示
   =========================================== */
.data-big { font-family: var(--font); font-size: 1.6rem; font-weight: 300; color: var(--text-heading); line-height: 1.1; }
.data-big small { font-size: 0.4em; font-weight: 400; opacity: 0.5; }
.data-label { font-size: 0.72rem; color: var(--text-body); margin-top: 2px; }
.metric-val { font-family: var(--font); font-size: 1.5rem; font-weight: 300; color: var(--text-heading); }
.metric-desc { font-size: 0.72rem; color: var(--text-body); margin-top: 4px; }

/* ===========================================
   网格
   =========================================== */
.grid { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* ===========================================
   列表
   =========================================== */
.styled-list { list-style: none; padding: 0; }
.styled-list li {
    padding: 4px 0 4px 16px; position: relative;
    font-size: 0.76rem; color: var(--text-body); line-height: 1.5;
}
.styled-list li::before {
    content: ''; position: absolute; left: 0; top: 9px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
}
.styled-list li strong { color: var(--text-heading); }

/* ===========================================
   排行榜
   =========================================== */
.rank-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rank-num { font-size: 1rem; font-weight: 300; color: var(--accent); width: 24px; text-align: right; }
.rank-bar { flex: 1; height: 20px; background: #f1f5f9; border-radius: 4px; position: relative; overflow: hidden; }
.rank-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent)); }
.rank-text {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 0.75rem; color: #fff; font-weight: 500; white-space: nowrap;
}

/* ===========================================
   深色 slide
   =========================================== */
.slide-dark { background: var(--bg-dark) !important; color: #ffffff; }
.slide-dark h2, .slide-dark .slide-title { color: #ffffff !important; border-bottom-color: var(--accent) !important; }
.slide-dark .card { background: rgba(255,255,255,0.06) !important; border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: none !important; }
.slide-dark .card-text { color: rgba(255,255,255,0.6) !important; }
.slide-dark .metric-val { color: #ffffff !important; }
.slide-dark .metric-desc { color: rgba(255,255,255,0.5) !important; }

/* 建议卡片 */
.suggest-card {
    background: rgba(255,255,255,0.06); border-radius: 6px; padding: 18px 14px;
    text-align: center; border: 1px solid rgba(255,255,255,0.1);
}
.suggest-card h3 { color: #ffffff !important; font-size: 0.88rem; font-weight: 500; margin-bottom: 6px; }
.suggest-card p { color: rgba(255,255,255,0.6); font-size: 0.76rem; line-height: 1.5; }
.suggest-card .num { font-size: 1.5rem; font-weight: 300; color: var(--accent); margin-bottom: 4px; }

/* 联系方式条 */
.contact-bar {
    margin-top: 16px; padding: 12px 16px;
    background: var(--accent-light); border-radius: 6px;
    border-left: 3px solid var(--accent);
    font-size: 0.76rem; color: rgba(255,255,255,0.8); line-height: 1.5;
}
.contact-bar strong { color: #fff; }

/* 两栏 */
.two-col { display: flex; gap: 16px; }
.two-col > div { flex: 1; }

/* 高亮提示框 */
.highlight-box {
    padding: 10px 14px; background: var(--accent-light);
    border-radius: 6px; border-left: 3px solid var(--accent);
}
.highlight-box p { font-size: 0.76rem; color: var(--text-body); line-height: 1.5; }
.highlight-box strong { color: var(--text-heading); }

/* ===========================================
   图表容器 — 固定 px，不用 vh
   =========================================== */
.chart-box { width: 100%; height: 200px; }

/* ===========================================
   图片容器 — background-image 方案
   =========================================== */
.bg-img {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
}

/* ===========================================
   悬停高亮 — 深色背景页 = 光晕，浅色背景页 = 阴影
   =========================================== */
.reveal .slides section .hl {
    transition: transform 0.3s var(--ease), filter 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}

/* 深色背景页：浮起 + 主题色边框 + 主题色双层光晕 */
.slide-dark .hl:hover {
    transform: translateY(-4px) scale(1.02);
    filter: brightness(1.1);
    border-color: rgba(var(--accent-rgb), 0.55) !important;
    box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.3), 0 0 30px rgba(var(--accent-rgb), 0.15);
}

/* 浅色背景页：浮起 + 主题色边框 + 暗色投影 */
.reveal .slides > section > section:not(.slide-dark) .hl:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(var(--accent-rgb), 0.55) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}

/* 辅助色卡片悬停 — 深色页：基于内联 border-color 精确匹配，显示对应颜色光晕 */
/* ⚠️ style* 选择器匹配 HTML 内联属性字面值，不能用 CSS 变量，必须写具体颜色值 */
.slide-dark .hl[style*="border-color:rgba(255,0,170"],
.slide-dark .hl[style*="border-color: rgba(255,0,170"] {
    transition: transform 0.3s var(--ease), filter 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.slide-dark .hl[style*="border-color:rgba(255,0,170"]:hover,
.slide-dark .hl[style*="border-color: rgba(255,0,170"]:hover {
    border-color: rgba(255,0,170,0.55) !important;
    box-shadow: 0 0 15px rgba(255,0,170,0.3), 0 0 30px rgba(255,0,170,0.15);
}

/* ===========================================
   入场动画
   =========================================== */
.reveal .slides > section > section:not([data-state="cover"]) > * {
    opacity: 0; transform: translateY(20px);
}
@keyframes coverContentIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}
[data-state="cover"].present .ce {
    animation: coverContentIn 0.7s var(--ease) both;
}
[data-state="cover"].present .ce:nth-child(1) { animation-delay: 0.15s; }
[data-state="cover"].present .ce:nth-child(2) { animation-delay: 0.3s; }
[data-state="cover"].present .ce:nth-child(3) { animation-delay: 0.45s; }
[data-state="cover"].present .ce:nth-child(4) { animation-delay: 0.6s; }
[data-state="cover"].present .ce:nth-child(5) { animation-delay: 0.75s; }

/* ===========================================
   画笔
   =========================================== */
.pen-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; pointer-events: none; }
.pen-canvas.active { pointer-events: auto; cursor: crosshair; }
.pen-toggle {
    position: fixed; bottom: 20px; right: 20px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(var(--accent-rgb),0.1); border: 1px solid rgba(var(--accent-rgb),0.2);
    color: var(--accent); font-size: 16px; cursor: pointer;
    opacity: 0.4; transition: all 0.3s;
}
.pen-toggle:hover { opacity: 1; background: rgba(var(--accent-rgb),0.15); }
.pen-toggle.active { opacity: 1; background: var(--accent); color: #fff; border-color: transparent; }

/* ===========================================
   编辑模式
   =========================================== */
.edit-hotzone { position: fixed; top: 0; left: 0; width: 80px; height: 80px; z-index: 10000; cursor: pointer; }
.edit-toggle {
    position: fixed; top: 10px; left: 10px; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease; z-index: 10001;
    background: var(--accent); color: #fff; border: none; border-radius: 4px;
    padding: 8px 14px; cursor: pointer; font-size: 14px; font-family: var(--font);
}
.edit-toggle.show, .edit-toggle.active { opacity: 1; pointer-events: auto; }
.edit-mode .reveal .slides section [contenteditable="true"] {
    outline: 1px dashed rgba(var(--accent-rgb),0.4); outline-offset: 2px;
    cursor: text; min-height: 1em;
}
.edit-mode .reveal .slides section [contenteditable="true"]:hover {
    outline-color: var(--accent); background: var(--accent-light);
}

/* ===========================================
   演讲者模式
   =========================================== */
.spk-toggle {
    position: fixed; bottom: 20px; right: 76px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(var(--accent-rgb),0.1); border: 1px solid rgba(var(--accent-rgb),0.2);
    color: var(--accent); font-size: 16px; cursor: pointer;
    opacity: 0.4; transition: all 0.3s;
}
.spk-toggle:hover { opacity: 1; background: rgba(var(--accent-rgb),0.15); }
.spk-toggle.active { opacity: 1; background: var(--accent); color: #fff; border-color: transparent; }
.speaker-popup {
    position: fixed; bottom: 76px; right: 20px; z-index: 999;
    width: 420px; max-height: 60vh; overflow-y: auto;
    background: #1a1a2e; color: #e0e0e0; border-radius: 10px;
    border: 1px solid rgba(var(--accent-rgb),0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    padding: 20px; font-size: 14px; display: none;
}
.speaker-popup.show { display: block; }
.speaker-popup h4 { color: var(--accent); margin-bottom: 10px; font-size: 15px; }
.speaker-popup .spk-notes { background: rgba(255,255,255,0.05); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; min-height: 40px; outline: none; line-height: 1.6; }
.speaker-popup .spk-notes:focus { background: rgba(255,255,255,0.08); border: 1px solid rgba(var(--accent-rgb),0.3); }
.speaker-popup .spk-timer { font-size: 20px; font-weight: 300; color: #fff; margin-bottom: 12px; font-variant-numeric: tabular-nums; }
.speaker-popup .spk-nav { display: flex; gap: 12px; margin-bottom: 12px; }
.speaker-popup .spk-nav button {
    flex: 1; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 13px;
}
.speaker-popup .spk-nav button:hover { background: rgba(var(--accent-rgb),0.2); color: #fff; }
.speaker-popup .spk-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
.speaker-popup .spk-close:hover { color: #fff; }

/* FA 图标字体修复 */
.reveal .slide-title .fas, .reveal .slide-title .far, .reveal .slide-title .fab,
.reveal .card-icon .fas, .reveal .card-icon .far, .reveal .card-icon .fab {
    font-family: 'Font Awesome 6 Free' !important; font-style: normal !important; font-weight: 900 !important;
}
.reveal .slide-title .fab, .reveal .card-icon .fab {
    font-family: 'Font Awesome 6 Brands' !important; font-weight: 400 !important;
}

/* === 同层级多内容逐个入场动画（stagger，@keyframes方案，不依赖transition） === */
@keyframes staggerIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
.reveal .slides section .stagger > * {
    opacity: 0;
}
.reveal .slides section .stagger.present > * {
    opacity: 1;
    animation: staggerIn 0.6s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
.reveal .slides section .stagger.present > *:nth-child(1) { animation-delay: 0.1s; }
.reveal .slides section .stagger.present > *:nth-child(2) { animation-delay: 0.35s; }
.reveal .slides section .stagger.present > *:nth-child(3) { animation-delay: 0.6s; }
.reveal .slides section .stagger.present > *:nth-child(4) { animation-delay: 0.85s; }
.reveal .slides section .stagger.present > *:nth-child(5) { animation-delay: 1.1s; }
.reveal .slides section .stagger.present > *:nth-child(6) { animation-delay: 1.35s; }

/* === Fragment 叙事动画（基于 Reveal.js fragment） === */
.reveal .slides section .fragment { opacity: 0; transform: translateY(15px); transition: opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
.reveal .slides section .fragment.visible { opacity: 1; transform: none; }
.reveal .slides section .fragment.impact { opacity: 0; transform: scale(0.85) translateY(10px); }
.reveal .slides section .fragment.impact.visible { opacity: 1; transform: scale(1) translateY(0); transition: opacity 0.6s cubic-bezier(0.34,1.56,0.64,1), transform 0.6s cubic-bezier(0.34,1.56,0.64,1); }

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .reveal .slides section .fragment { opacity: 1 !important; transform: none !important; }
}
</style>
</head>
<body>

<!-- 📌 固定顶部导航栏 -->
<nav class="top-nav">
    <div class="nb">{{BRAND}}</div>
    <div class="nl">
        {{NAV_LINKS}}
    </div>
</nav>

<!-- 幻灯片 — 垂直导航：所有 slide 在同一个外层 section 中 -->
<div class="reveal"><div class="slides"><section>

{{SLIDE_CONTENT}}

</section></div></div>

<!-- 编辑热区 + 按钮 -->
<div class="edit-hotzone"></div>
<button class="edit-toggle" id="editToggle" title="编辑模式 (E)">Edit</button>

<!-- 画笔 -->
<canvas class="pen-canvas" id="penCanvas"></canvas>
<button class="pen-toggle" id="penToggle" title="画笔模式 (D)"><i class="fas fa-pen"></i></button>

<!-- 演讲者模式 -->
<button class="spk-toggle" id="spkToggle" title="演讲者模式 (S)"><i class="fas fa-desktop"></i></button>

<!-- Reveal.js JS — 只加载一次 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.js"></script>

<!-- ECharts — 仅数据驱动型或平衡型包含 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

<script>
// ========== Reveal.js 初始化 ==========
Reveal.initialize({
    hash: true, transition: 'slide', transitionSpeed: 'default',
    width: 1200, height: 700, margin: 0.04,
    controls: false, controlsTutorial: false,
    progress: true, center: false, slideNumber: false,
    keyboard: true, mouseWheel: true, navigationMode: 'default'
});

// ========== 导航栏（垂直导航） ==========
var navLinks = document.querySelectorAll('.top-nav .nl a');
navLinks.forEach(function(l) {
    l.addEventListener('click', function(e) {
        e.preventDefault();
        Reveal.slide(0, parseInt(this.getAttribute('data-slide')));
    });
});
Reveal.on('slidechanged', function(e) {
    var v = e.indexv, a = null;
    navLinks.forEach(function(l) {
        var t = parseInt(l.getAttribute('data-slide'));
        l.classList.remove('active');
        if (v >= t) a = l;
    });
    navLinks.forEach(function(l) { l.classList.remove('active'); });
    if (a) a.classList.add('active');
});
Reveal.on('ready', function() {
    var v = Reveal.getIndices().v, a = null;
    navLinks.forEach(function(l) {
        var t = parseInt(l.getAttribute('data-slide'));
        l.classList.remove('active');
        if (v >= t) a = l;
    });
    navLinks.forEach(function(l) { l.classList.remove('active'); });
    if (a) a.classList.add('active');
});

// ========== ECharts ==========
var chartConfigs = {};
var chartInstances = {};
function renderCharts() {
    Object.entries(chartConfigs).forEach(function(e) {
        var id = e[0], cfg = e[1], dom = document.getElementById(id);
        if (!dom) return;
        if (!chartInstances[id]) chartInstances[id] = echarts.init(dom);
        chartInstances[id].setOption(cfg);
    });
}
Reveal.on('ready', renderCharts);
Reveal.on('slidechanged', function() {
    setTimeout(function() {
        Object.values(chartInstances).forEach(function(c) { c.resize(); });
    }, 300);
});
window.addEventListener('resize', function() {
    Object.values(chartInstances).forEach(function(c) { c.resize(); });
});

// ========== 页面入场动画 ==========
// fragment 元素由 Reveal.js 内置处理（点击逐步显示），这里只处理非 fragment 的默认入场
function animateContentSlide() {
    var cur = Reveal.getCurrentSlide();
    if (!cur || cur.getAttribute('data-state') === 'cover') return;
    // Stagger: 同层级容器内子元素依次入场（@keyframes驱动）
    cur.querySelectorAll('.stagger').forEach(function(container) {
        container.classList.remove('present');
        void container.offsetHeight; // 强制回流，重置动画
        container.classList.add('present');
    });
    // 非 stagger 容器的直接子元素：淡入
    var els = Array.prototype.slice.call(cur.children);
    var baseDelay = 0.4;
    var stagger = 0.25;
    els.forEach(function(el, i) {
        if (el.classList.contains('fragment') || el.classList.contains('stagger')) return;
        el.style.transition = 'opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
        el.style.transitionDelay = (baseDelay + i * stagger) + 's';
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
    });
    if (cur.querySelector('[id^="chart"]')) setTimeout(animateChartsInSlide, 500);
    var rb = cur.querySelectorAll('.rank-fill[data-w]');
    if (rb.length) {
        rb.forEach(function(b) { b.style.transition = 'none'; b.style.width = '0%'; });
        setTimeout(function() {
            rb.forEach(function(b, i) {
                b.style.transition = 'width 0.8s cubic-bezier(0.16,1,0.3,1)';
                setTimeout(function() { b.style.width = b.getAttribute('data-w'); }, i * 150);
            });
        }, 500);
    }
}
function animateChartsInSlide() {
    var cur = Reveal.getCurrentSlide();
    if (!cur) return;
    cur.querySelectorAll('[id^="chart"]').forEach(function(dom) {
        var id = dom.id;
        if (!chartInstances[id] || !chartConfigs[id]) return;
        chartInstances[id].clear();
        chartInstances[id].setOption(chartConfigs[id]);
    });
}
function resetSlideAnim(e) {
    var p = e.previousSlide;
    if (p && p.getAttribute('data-state') !== 'cover') {
        Array.prototype.slice.call(p.children).forEach(function(el) {
            if (el.classList.contains('stagger')) return;
            el.style.transition = 'none'; el.style.opacity = '';
            el.style.transform = ''; el.style.transitionDelay = '';
        });
        p.querySelectorAll('.stagger').forEach(function(c) { c.classList.remove('present'); });
        p.querySelectorAll('.rank-fill').forEach(function(b) {
            b.style.transition = 'none'; b.style.width = '0%';
        });
    }
}

// ========== 封面动画（CSS + JS 双轨） ==========
function updateCoverState() {
    var c = Reveal.getCurrentSlide();
    if (c && c.getAttribute('data-state') === 'cover') document.body.classList.add('cover-active');
    else document.body.classList.remove('cover-active');
}
function animateCoverSlide() {
    var c = document.querySelector('[data-state="cover"]');
    if (!c) return;
    c.querySelectorAll('.ce').forEach(function(el) {
        el.style.animation = 'none'; void el.offsetHeight; el.style.animation = '';
    });
}
Reveal.on('ready', function() {
    updateCoverState(); setTimeout(animateCoverSlide, 100); setTimeout(animateContentSlide, 400); autoPositionImages();
});
Reveal.on('slidechanged', function(e) {
    resetSlideAnim(e); updateCoverState();
    var c = Reveal.getCurrentSlide();
    if (c && c.getAttribute('data-state') === 'cover') setTimeout(animateCoverSlide, 100);
    setTimeout(animateContentSlide, 400);
    autoPositionImages();
});

// ========== 编辑模式 ==========
var editToggle = document.getElementById('editToggle'), hotzone = document.querySelector('.edit-hotzone'), isEdit = false, hideT;
function toggleEdit() {
    isEdit = !isEdit;
    document.body.classList.toggle('edit-mode', isEdit);
    editToggle.classList.toggle('active', isEdit);
    document.querySelectorAll('.reveal .slides section').forEach(function(s) {
        s.querySelectorAll('div,p,span,li,h1,h2,h3,h4,strong,em,a').forEach(function(el) {
            if (!el.querySelector('div,section,nav')) el.contentEditable = isEdit ? 'true' : 'false';
        });
    });
    if (isEdit) { editToggle.textContent = 'Save'; editToggle.title = '保存并退出编辑 (E)'; }
    else { editToggle.textContent = 'Edit'; editToggle.title = '编辑模式 (E)'; localStorage.setItem('slides-content', document.querySelector('.reveal').innerHTML); }
}
editToggle.addEventListener('click', toggleEdit);
hotzone.addEventListener('mouseenter', function() { clearTimeout(hideT); editToggle.classList.add('show'); });
hotzone.addEventListener('mouseleave', function() { hideT = setTimeout(function() { if (!isEdit) editToggle.classList.remove('show'); }, 400); });
editToggle.addEventListener('mouseenter', function() { clearTimeout(hideT); });
editToggle.addEventListener('mouseleave', function() { hideT = setTimeout(function() { if (!isEdit) editToggle.classList.remove('show'); }, 400); });
hotzone.addEventListener('click', toggleEdit);
document.addEventListener('keydown', function(e) { if ((e.key === 'e' || e.key === 'E') && !e.target.getAttribute('contenteditable')) toggleEdit(); });
document.querySelector('.reveal').addEventListener('click', function(e) {
    if (document.body.classList.contains('edit-mode')) return;
    var el = e.target;
    if (['CANVAS','A','BUTTON','INPUT','TEXTAREA','SELECT'].includes(el.tagName)) return;
    if (el.contentEditable === 'true') return;
    var ht = Array.from(el.childNodes).some(function(n) { return n.nodeType === 3 && n.textContent.trim(); });
    if (ht) return; Reveal.next();
});
document.querySelector('.reveal').addEventListener('contextmenu', function(e) {
    if (document.getElementById('penCanvas').classList.contains('active')) return;
    e.preventDefault();
    var el = e.target;
    if (['CANVAS','A','BUTTON','INPUT','TEXTAREA','SELECT'].includes(el.tagName)) return;
    var ht = Array.from(el.childNodes).some(function(n) { return n.nodeType === 3 && n.textContent.trim(); });
    if (ht) return; Reveal.prev();
});

// ========== 画笔 ==========
var penCanvas = document.getElementById('penCanvas'), penCtx = penCanvas.getContext('2d'), penToggle = document.getElementById('penToggle'), isPen = false, isDraw = false;
function resizePen() { penCanvas.width = window.innerWidth; penCanvas.height = window.innerHeight; }
resizePen(); window.addEventListener('resize', resizePen);
function togglePen() { isPen = !isPen; penCanvas.classList.toggle('active', isPen); penToggle.classList.toggle('active', isPen); }
penToggle.addEventListener('click', togglePen);
document.addEventListener('keydown', function(e) { if ((e.key === 'd' || e.key === 'D') && !e.target.getAttribute('contenteditable')) togglePen(); });
penCanvas.addEventListener('mousedown', function(e) { if (e.button === 2) return; isDraw = true; penCtx.lineWidth = 3; penCtx.lineCap = 'round'; penCtx.lineJoin = 'round'; penCtx.strokeStyle = 'rgba(255,50,50,0.9)'; penCtx.beginPath(); penCtx.moveTo(e.clientX, e.clientY); });
penCanvas.addEventListener('mousemove', function(e) { if (!isDraw) return; penCtx.lineTo(e.clientX, e.clientY); penCtx.stroke(); });
penCanvas.addEventListener('mouseup', function() { isDraw = false; });
penCanvas.addEventListener('mouseleave', function() { isDraw = false; });
penCanvas.addEventListener('contextmenu', function(e) { e.preventDefault(); penCtx.clearRect(0, 0, penCanvas.width, penCanvas.height); });
Reveal.on('slidechanged', function() { penCtx.clearRect(0, 0, penCanvas.width, penCanvas.height); });

// ========== 演讲者模式 ==========
var spkToggle = document.getElementById('spkToggle'), spkPopup = null, spkTimer = null, spkSec = 0, spkRunning = false;
function toggleSpeaker() {
    if (!spkPopup) {
        spkPopup = document.createElement('div');
        spkPopup.className = 'speaker-popup';
        spkPopup.innerHTML = '<button class="spk-close" onclick="toggleSpeaker()">\u2716</button>'
            + '<h4><i class="fas fa-desktop"></i> 演讲者模式</h4>'
            + '<div class="spk-timer" id="spkTimerVal">00:00</div>'
            + '<div class="spk-nav"><button onclick="Reveal.prev();updateSpkNotes()">\u25C0 上一页</button><button onclick="Reveal.next();updateSpkNotes()">下一页 \u25B6</button></div>'
            + '<h4>当前页备注</h4><div class="spk-notes" id="spkNotesEdit" contenteditable="true">编辑备注...</div>'
            + '<h4 style="margin-top:12px">下一页预览</h4><div class="spk-notes" id="spkNextPreview" style="opacity:0.5"></div>';
        document.body.appendChild(spkPopup);
        // 备注编辑后同步回 slide 中的 speaker-notes div
        document.getElementById('spkNotesEdit').addEventListener('blur', function() {
            var cur = Reveal.getCurrentSlide();
            var notes = cur.querySelector('.speaker-notes');
            if (notes) notes.textContent = this.textContent;
        });
        Reveal.on('slidechanged', updateSpkNotes);
    }
    spkPopup.classList.toggle('show');
    spkToggle.classList.toggle('active');
    if (spkPopup.classList.contains('show') && !spkRunning) { spkRunning = true; startSpkTimer(); }
    updateSpkNotes();
}
function startSpkTimer() {
    spkTimer = setInterval(function() { spkSec++; var m = String(Math.floor(spkSec/60)).padStart(2,'0'), s = String(spkSec%60).padStart(2,'0'); var el = document.getElementById('spkTimerVal'); if (el) el.textContent = m + ':' + s; }, 1000);
}
function updateSpkNotes() {
    if (!spkPopup) return;
    var cur = Reveal.getCurrentSlide();
    var notes = cur.querySelector('.speaker-notes');
    var notesEl = document.getElementById('spkNotesEdit');
    if (notesEl) notesEl.textContent = notes ? notes.textContent : '（无备注）';
    // 下一页预览
    var idx = Reveal.getIndices();
    var nextSlide = cur.nextElementSibling;
    var prevEl = document.getElementById('spkNextPreview');
    if (prevEl) {
        if (nextSlide) {
            var nn = nextSlide.querySelector('.speaker-notes');
            var tt = nextSlide.querySelector('.slide-title');
            prevEl.textContent = (tt ? tt.textContent + ' — ' : '') + (nn ? nn.textContent.substring(0, 80) : '（无备注）');
        } else { prevEl.textContent = '（最后一页）'; }
    }
}
spkToggle.addEventListener('click', toggleSpeaker);
document.addEventListener('keydown', function(e) { if ((e.key === 's' || e.key === 'S') && !e.target.getAttribute('contenteditable')) toggleSpeaker(); });

// ========== 图片智能定位 ==========
// 根据图片与容器的宽高比差异，自动调整 background-position
// 竖图在宽容器中偏上显示，避免裁掉顶部重要内容
function autoPositionImages() {
    document.querySelectorAll('.bg-img:not([data-ap])').forEach(function(el) {
        var url = el.style.backgroundImage;
        if (!url) return;
        var m = url.match(/url\(['"]?(.*?)['"]?\)/);
        if (!m) return;
        var elW = el.offsetWidth, elH = el.offsetHeight;
        if (!elW || !elH) return; // 元素未渲染，下次再试
        el.setAttribute('data-ap', '1');
        var img = new Image();
        img.onload = function() {
            var ir = img.naturalWidth / img.naturalHeight;
            var er = elW / elH;
            var x = 50, y = 50, d = ir / er;
            if (d < 0.6) y = 25;       // 极竖图 → 显示上方25%
            else if (d < 0.8) y = 35;   // 偏竖图 → 显示上方35%
            else if (d > 2.0) x = 40;   // 极宽图 → 偏左显示
            el.style.backgroundPosition = x + '% ' + y + '%';
        };
        img.src = m[1];
    });
}
</script>
</body>
</html>
